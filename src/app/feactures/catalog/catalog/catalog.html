<section class="container">

  <h2 class="text-center mb-4 mt-5">Nuestro Catálogo</h2>

  <!-- Buscador -->
  <div class="row justify-content-center mb-4">
    <div class="col-md-6">

      <div class="input-group shadow-sm">
        <span class="input-group-text bg-dark text-white border-0">
          <i class="bi bi-search"></i>
        </span>

        <div class="col-md-6">
        <input
            type="text"
            class="form-control form-control-lg shadow-sm"
            placeholder="Buscar playeras, artículos, accesorios..."
            [(ngModel)]="searchTerm">
        </div>
      </div>

    </div>
  </div>

  <!-- Productos -->
  <app-product-card [search]="searchTerm"></app-product-card>

</section>
